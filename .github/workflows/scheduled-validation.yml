name: Public Scheduled Validation

on:
  workflow_dispatch:
  schedule:
    - cron: "23 4 * * *"

permissions:
  contents: read

concurrency:
  group: public-scheduled-validation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validation:
    name: Run public-safe scheduled validation
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip check

      - name: Run scheduled validation evidence check
        run: bash scripts/check_public_private_infra_scheduled_validation.sh

      - name: Recheck post-remediation drift refresh
        run: bash scripts/check_public_private_infra_post_remediation_drift_refresh.sh

      - name: Recheck public secret boundary
        run: bash scripts/check_public_export_secrets.sh
