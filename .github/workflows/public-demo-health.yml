name: Public Demo Health

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read

jobs:
  pages-demo:
    name: Pages demo health
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Check public demo
        run: |
          set -euo pipefail
          url="https://alexgerlitz.github.io/drivedesk-core/apps/admin/public-demo/"
          base="${url%/}"
          root="${base%/apps/admin/public-demo}"
          html="$(curl -fsSL --retry 3 --retry-delay 5 "$url")"
          printf '%s' "$html" | grep -F "DriveDesk Core Demo"
          printf '%s' "$html" | grep -F "data-demo-api-path"
          printf '%s' "$html" | grep -F "./demo-data.js"
          printf '%s' "$html" | grep -F "./styles.css"
          printf '%s' "$html" | grep -F "./app.js"
          printf '%s' "$html" | grep -F "adapterRows"
          printf '%s' "$html" | grep -F "syncJobRows"
          printf '%s' "$html" | grep -F "integrationHealthRows"
          printf '%s' "$html" | grep -F "alertRoutingSummaryRows"
          printf '%s' "$html" | grep -F "alertBindingRows"
          printf '%s' "$html" | grep -F "proofSummaryRows"
          printf '%s' "$html" | grep -F "proofGateRows"
          printf '%s' "$html" | grep -F "workflowStageRows"
          printf '%s' "$html" | grep -F "workflowTimelineRows"
          printf '%s' "$html" | grep -F "domainEventRows"
          curl -fsSL --retry 3 --retry-delay 5 "$base/demo-data.js" | grep -F "DRIVEDESK_DEMO_DATA"
          curl -fsSL --retry 3 --retry-delay 5 "$base/demo-data.js" | grep -F "static.fallback"
          curl -fsSL --retry 3 --retry-delay 5 "$base/demo-data.js" | grep -F "/demo/public"
          curl -fsSL --retry 3 --retry-delay 5 "$base/demo-data.js" | grep -F "engineering_70"
          curl -fsSL --retry 3 --retry-delay 5 "$base/demo-data.js" | grep -F "wf-demo-lead-to-student"
          curl -fsSL --retry 3 --retry-delay 5 "$base/demo-data.js" | grep -F "lead.created"
          curl -fsSL --retry 3 --retry-delay 5 "$base/demo-data.js" | grep -F "student.sync.requested"
          curl -fsSL --retry 3 --retry-delay 5 "$base/demo-data.js" | grep -F "DriveDeskScheduledValidationMissed"
          curl -fsSL --retry 3 --retry-delay 5 "$base/demo-data.js" | grep -F "alert.silence.created"
          curl -fsSL --retry 3 --retry-delay 5 "$base/demo-data.js" | grep -F "file.import.fake"
          curl -fsSL --retry 3 --retry-delay 5 "$base/demo-data.js" | grep -F "dead_letter"
          curl -fsSL --retry 3 --retry-delay 5 "$base/demo-data.js" | grep -F "drivedesk_integration_jobs"
          curl -fsSL --retry 3 --retry-delay 5 "$base/demo-data.js" | grep -F "drivedesk_integration_adapter_duration_milliseconds"
          curl -fsSL --retry 3 --retry-delay 5 "$base/styles.css" | grep -F "metric-grid"
          curl -fsSL --retry 3 --retry-delay 5 "$base/styles.css" | grep -F "integration-health-grid"
          curl -fsSL --retry 3 --retry-delay 5 "$base/app.js" | grep -F "setupTabs"
          curl -fsSL --retry 3 --retry-delay 5 "$base/app.js" | grep -F "loadApiBackedDemoData"
          curl -fsSL --retry 3 --retry-delay 5 "$base/app.js" | grep -F "demoApi"
          curl -fsSL --retry 3 --retry-delay 5 "$base/app.js" | grep -F "/demo/public"
          curl -fsSL --retry 3 --retry-delay 5 "$base/app.js" | grep -F "fillEngineeringProof"
          curl -fsSL --retry 3 --retry-delay 5 "$base/app.js" | grep -F "fillAlertRouting"
          curl -fsSL --retry 3 --retry-delay 5 "$base/app.js" | grep -F "fillWorkflow"
          curl -fsSL --retry 3 --retry-delay 5 "$base/app.js" | grep -F "fillWorkflowTimeline"
          curl -fsSL --retry 3 --retry-delay 5 "$base/app.js" | grep -F "fillDomainEvents"
          curl -fsSL --retry 3 --retry-delay 5 "$base/app.js" | grep -F "fillAdapterContracts"
          curl -fsSL --retry 3 --retry-delay 5 "$base/app.js" | grep -F "fillIntegrationHealth"
          curl -fsSL --retry 3 --retry-delay 5 "$root/sdk/generated/public-demo/openapi-client-manifest.json" | grep -F "public_demo_demo_public_get"
          curl -fsSL --retry 3 --retry-delay 5 "$root/sdk/generated/public-demo/openapi-client-manifest.json" | grep -F "synthetic_fake_data"
          curl -fsSL --retry 3 --retry-delay 5 "$root/sdk/generated/public-demo/python/drivedesk_public_demo_client.py" | grep -F "DriveDeskPublicDemoClient"
          curl -fsSL --retry 3 --retry-delay 5 "$root/sdk/generated/public-demo/javascript/drivedesk-public-demo-client.mjs" | grep -F "DriveDeskPublicDemoClient"
          curl -fsSL --retry 3 --retry-delay 5 "$root/sdk/generated/public-demo/typescript/drivedesk-public-demo-client.d.ts" | grep -F "PublicDemoPayload"
