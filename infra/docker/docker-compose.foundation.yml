services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: drivedesk
      POSTGRES_USER: drivedesk
      POSTGRES_PASSWORD: ${DRIVEDESK_POSTGRES_PASSWORD:-drivedesk}
    volumes:
      - drivedesk_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drivedesk -d drivedesk"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.drivedesk
    environment:
      DRIVEDESK_ENVIRONMENT: local
      DRIVEDESK_DATABASE_URL: postgresql+asyncpg://drivedesk:${DRIVEDESK_POSTGRES_PASSWORD:-drivedesk}@postgres:5432/drivedesk
      DRIVEDESK_REDIS_URL: redis://redis:6379/0
    command: ["alembic", "-c", "apps/api/alembic.ini", "upgrade", "head"]
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.drivedesk
    environment:
      DRIVEDESK_ENVIRONMENT: local
      DRIVEDESK_DATABASE_URL: postgresql+asyncpg://drivedesk:${DRIVEDESK_POSTGRES_PASSWORD:-drivedesk}@postgres:5432/drivedesk
      DRIVEDESK_REDIS_URL: redis://redis:6379/0
    command: ["uvicorn", "drivedesk_api.main:app", "--host", "0.0.0.0", "--port", "8080"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.drivedesk
    environment:
      DRIVEDESK_ENVIRONMENT: local
      DRIVEDESK_DATABASE_URL: postgresql+asyncpg://drivedesk:${DRIVEDESK_POSTGRES_PASSWORD:-drivedesk}@postgres:5432/drivedesk
      DRIVEDESK_REDIS_URL: redis://redis:6379/0
    command: ["python", "-m", "drivedesk_worker.main"]
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  drivedesk_postgres_data:
