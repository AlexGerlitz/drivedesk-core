name: Public Demo Health

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"

permissions:
  contents: read

jobs:
  pages-demo:
    name: Pages demo health
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Check public demo
        run: |
          set -euo pipefail
          url="https://alexgerlitz.github.io/drivedesk-core/apps/admin/public-demo/"
          base="${url%/}"
          root="${base%/apps/admin/public-demo}"
          html="$(curl -fsSL --retry 3 --retry-delay 5 "$url")"
          printf '%s' "$html" | grep -F "DriveDesk Core Demo"
          printf '%s' "$html" | grep -F "data-demo-api-path"
          printf '%s' "$html" | grep -F "./demo-data.js"
          printf '%s' "$html" | grep -F "./styles.css"
          printf '%s' "$html" | grep -F "./app.js"
          printf '%s' "$html" | grep -F "adapterRows"
          printf '%s' "$html" | grep -F "syncJobRows"
          printf '%s' "$html" | grep -F "integrationHealthRows"
          printf '%s' "$html" | grep -F "alertRoutingSummaryRows"
          printf '%s' "$html" | grep -F "alertBindingRows"
          printf '%s' "$html" | grep -F "incidentSummaryRows"
          printf '%s' "$html" | grep -F "incidentRows"
          printf '%s' "$html" | grep -F "proofSummaryRows"
          printf '%s' "$html" | grep -F "proofGateRows"
          printf '%s' "$html" | grep -F "workflowStageRows"
          printf '%s' "$html" | grep -F "endToEndScenarioRows"
          printf '%s' "$html" | grep -F "workflowTimelineRows"
          printf '%s' "$html" | grep -F "domainEventRows"
          printf '%s' "$html" | grep -F "controlTowerSummaryRows"
          printf '%s' "$html" | grep -F "controlTowerProviderRows"
          printf '%s' "$html" | grep -F "controlTowerContextRows"
          printf '%s' "$html" | grep -F "controlTowerEscalationRows"
          printf '%s' "$html" | grep -F "controlTowerActionPlanRows"
          printf '%s' "$html" | grep -F "controlTowerNotificationRows"
          printf '%s' "$html" | grep -F "controlTowerObservationRows"
          printf '%s' "$html" | grep -F "controlTowerExceptionRows"
          printf '%s' "$html" | grep -F "controlTowerRepairRows"
          curl -fsSL --retry 3 --retry-delay 5 "$base/demo-data.js" | grep -F "DRIVEDESK_DEMO_DATA"
          curl -fsSL --retry 3 --retry-delay 5 "$base/demo-data.js" | grep -F "static.fallback"
          curl -fsSL --retry 3 --retry-delay 5 "$base/demo-data.js" | grep -F "/demo/public"
          curl -fsSL --retry 3 --retry-delay 5 "$base/demo-data.js" | grep -F "engineering_70"
