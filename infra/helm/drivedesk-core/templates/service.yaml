apiVersion: v1
kind: Service
metadata:
  name: {{ include "drivedesk-core.fullname" . }}-api
  labels:
    {{- include "drivedesk-core.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "drivedesk-core.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
